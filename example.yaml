# ESPHome configuration for Sunfree/Persilux 433 MHz motorized blinds.
#
# Hardware: ESP32-S3-DevKitC-1 + CC1101 433 MHz module
#
# 1. Copy this file and rename it (e.g. sunfree-blinds.yaml).
# 2. Create a secrets.yaml with: wifi_ssid, wifi_password,
#    api_key (base64, 32 bytes), and ota_password.
# 3. Flash, pair your motors, then add motor_id values below.
# 4. Adjust GPIO pins if your wiring differs.

esphome:
  name: sunfree-blinds
  friendly_name: "Sunfree Blinds Controller"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: "y"

# Enable PSRAM for boards with 8 MB PSRAM (N8R8, N16R8).
# Recommended for setups with more than 8 covers.
psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key
  custom_services: true

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: {type: git, url: https://github.com/amasolov/esphome-sunfree-blinds}
    components: [sunfree_blinds]

# --- SPI bus (ESP32-S3 -> CC1101 module) ---
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

# --- CC1101 433 MHz radio ---
cc1101:
  id: cc1101_radio
  cs_pin: GPIO5
  gdo0_pin: GPIO4
  frequency: 433.95MHz
  modulation_type: GFSK
  symbol_rate: 40000
  fsk_deviation: 20kHz
  filter_bandwidth: 203kHz
  packet_mode: true
  packet_length: 29
  sync_mode: "16/16"
  sync1: 0xD4
  sync0: 0x92
  num_preamble: 7
  on_packet:
    then:
      - lambda: |-
          id(sunfree_hub).on_cc1101_packet(x, rssi);

# --- Sunfree hub ---
# hub_id is optional. If omitted, a random ID is generated on first boot
# and stored in NVS. Set hub_id to migrate from a Tuya AC801B hub so
# existing motors accept commands without re-pairing.
sunfree_blinds:
  id: sunfree_hub
  cc1101_id: cc1101_radio
  # hub_id: "aabbccdd"
  groups:
    - name: "Bedroom Night"
      motor_ids: ["11223344", "11556677"]
    - name: "Bedroom Day"
      motor_ids: ["10223344", "10556677"]

# --- Blind covers ---
# Each physical unit has TWO rollers (night + day) with separate motor IDs.
# Use the pairing scan below to discover motor IDs.
cover:
  - platform: sunfree_blinds
    name: "Bedroom Left Night"
    motor_id: "11223344"
    battery:
      name: "Bedroom Left Night Battery"

  - platform: sunfree_blinds
    name: "Bedroom Left Day"
    motor_id: "10223344"
    battery:
      name: "Bedroom Left Day Battery"

  - platform: sunfree_blinds
    name: "Bedroom Right Night"
    motor_id: "11556677"
    battery:
      name: "Bedroom Right Night Battery"

  - platform: sunfree_blinds
    name: "Bedroom Right Day"
    motor_id: "10556677"
    battery:
      name: "Bedroom Right Day Battery"

# --- Pairing ---
# Press "Start Pairing Scan" in HA, then press the M button on the motor.
# Motor IDs appear in the "Pairing Status" text sensor.
button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Start Pairing Scan"
    icon: "mdi:bluetooth-connect"
    on_press:
      then:
        - lambda: id(sunfree_hub).start_scan();

  - platform: template
    name: "Stop Pairing Scan"
    icon: "mdi:bluetooth-off"
    on_press:
      then:
        - lambda: id(sunfree_hub).stop_scan();

# --- Motor configuration ---
# Call from HA Developer Tools > Services:
#
#   service: esphome.sunfree_blinds_send_config
#   data:
#     motor_id: "11223344"
#     action_type: "direction_forward"
#
# Available action_type values:
#   direction_forward, direction_reverse,
#   set_open_limit, set_close_limit,
#   save_favourite, goto_favourite,
#   request_status
#
# Group commands:
#   service: esphome.sunfree_blinds_group_command
#   data:
#     group: "Bedroom Night"
#     action: "open"

# --- Diagnostics ---
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

text_sensor:
  - platform: template
    name: "Hub ID"
    icon: "mdi:identifier"
    update_interval: 60s
    lambda: return id(sunfree_hub).get_hub_id_str();

  - platform: template
    name: "Pairing Status"
    icon: "mdi:bluetooth-settings"
    update_interval: 5s
    lambda: return id(sunfree_hub).get_pairing_status();

  - platform: template
    name: "Discovered Motors"
    icon: "mdi:format-list-bulleted"
    update_interval: 5s
    lambda: return id(sunfree_hub).get_discovered_ids_str();
