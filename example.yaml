# ESPHome configuration for Sunfree AC2001-15D blinds via ESP32 + CC1101.
#
# 1. Copy this file and rename it (e.g. sunfree-blinds.yaml).
# 2. Create a secrets.yaml next to it with wifi_ssid, wifi_password,
#    api_key (base64, 32 bytes), and ota_password.
# 3. Pair your motors (see Pairing section below), then add motor_id values.
# 4. Adjust GPIO pins if your wiring differs from the reference.

esphome:
  name: sunfree-blinds
  friendly_name: "Sunfree Blinds Controller"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Sunfree-Blinds-AP"
    password: "sunfreesetup"

captive_portal:

web_server:
  port: 80
  local: true

# Load the sunfree_blinds component from this repository.
# If you cloned locally, use:  {type: local, path: components}
# If using from GitHub:
#   {type: git, url: https://github.com/amasolov/esphome-sunfree-blinds}
external_components:
  - source: {type: local, path: components}
    components: [sunfree_blinds]

# --- SPI bus (ESP32-S3 → CC1101 module) ---
spi:
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13

# --- CC1101 433 MHz radio ---
cc1101:
  id: cc1101_radio
  cs_pin: GPIO5
  gdo0_pin: GPIO4
  frequency: 433.95MHz
  modulation_type: GFSK
  symbol_rate: 40000
  fsk_deviation: 38kHz
  filter_bandwidth: 203kHz
  packet_mode: true
  packet_length: 29
  sync_mode: "16/16"
  sync1: 0xD4
  sync0: 0x92
  num_preamble: 7
  on_packet:
    then:
      - lambda: |-
          id(sunfree_hub).on_cc1101_packet(x, rssi);

# --- Sunfree hub ---
# hub_id is optional. If omitted, a random 4-byte ID is generated on first
# boot and stored in NVS. If migrating from a Tuya AC801B hub, set hub_id
# to its ID so existing motors accept commands without re-pairing.
sunfree_blinds:
  id: sunfree_hub
  # hub_id: "15241342"        # uncomment to use a specific hub ID
  cc1101_id: cc1101_radio

# --- Blind motors ---
# Each physical Sunfree AC2001-15D unit has TWO rollers (night + day),
# each with its own motor_id.  Add one cover entry per roller.
# Use the pairing scan (below) to discover motor IDs.
cover:
  - platform: sunfree_blinds
    name: "Office Night Blind"
    motor_id: "034a105b"      # <-- replace with your night-roller motor ID
    battery:
      name: "Office Night Blind Battery"

  - platform: sunfree_blinds
    name: "Office Day Blind"
    motor_id: "044a105b"      # <-- replace with your day-roller motor ID
    battery:
      name: "Office Day Blind Battery"

# --- Pairing ---
# Press "Start Pairing Scan" in HA, then press the M button on the motor.
# The motor IDs appear in the "Pairing Status" text sensor.
# Add them to the cover section above and reflash.
button:
  - platform: restart
    name: "Restart"

  - platform: template
    name: "Start Pairing Scan"
    on_press:
      then:
        - lambda: |-
            id(sunfree_hub).start_scan();

  - platform: template
    name: "Stop Pairing Scan"
    on_press:
      then:
        - lambda: |-
            id(sunfree_hub).stop_scan();

  # --- Motor configuration buttons ---
  # These send one-shot commands to configure motor direction, limits,
  # and favourite position.  Duplicate for each motor_id as needed.
  - platform: sunfree_blinds
    name: "Night Direction Forward"
    motor_id: "034a105b"
    action_type: direction_forward
  - platform: sunfree_blinds
    name: "Night Direction Reverse"
    motor_id: "034a105b"
    action_type: direction_reverse
  - platform: sunfree_blinds
    name: "Night Set Open Limit"
    motor_id: "034a105b"
    action_type: set_open_limit
  - platform: sunfree_blinds
    name: "Night Set Close Limit"
    motor_id: "034a105b"
    action_type: set_close_limit
  - platform: sunfree_blinds
    name: "Night Save Favourite"
    motor_id: "034a105b"
    action_type: save_favourite
  - platform: sunfree_blinds
    name: "Night Go To Favourite"
    motor_id: "034a105b"
    action_type: goto_favourite

# --- Diagnostics ---
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: template
    name: "RX Valid Packets"
    update_interval: 10s
    lambda: |-
      return id(sunfree_hub).get_rx_valid_count();

  - platform: template
    name: "RX ACK Count"
    update_interval: 10s
    lambda: |-
      return id(sunfree_hub).get_rx_ack_count();

  - platform: template
    name: "RX Beacon Count"
    update_interval: 5s
    lambda: |-
      return id(sunfree_hub).get_rx_beacon_count();

text_sensor:
  - platform: template
    name: "Hub ID"
    update_interval: 60s
    lambda: |-
      return id(sunfree_hub).get_hub_id_str();

  - platform: template
    name: "Last RX Info"
    update_interval: 10s
    lambda: |-
      return id(sunfree_hub).get_last_rx_info();

  - platform: template
    name: "Command Status"
    update_interval: 10s
    lambda: |-
      return id(sunfree_hub).get_piggyback_status();

  - platform: template
    name: "Pairing Status"
    update_interval: 5s
    lambda: |-
      return id(sunfree_hub).get_pairing_status();
